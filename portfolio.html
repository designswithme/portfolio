<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Portfolio | Nashae Carter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <a href="index.html" class="logo-link">
      <img src="white-logo.png" alt="Logo" class="logo-img">
    </a>

    <p class="tagline">Where Your Vision Takes Shape</p>

    <nav>
      <a href="portfolio.html">PORTFOLIO</a>
      <a href="#">RÉSUMÉ</a>
      <a href="#">CONTACT</a>
    </nav>

    <a href="https://www.linkedin.com/in/nashae-carter/"
       target="_blank"
       rel="noopener noreferrer"
       class="linkedin"
       aria-label="Visit my LinkedIn profile">
      <img src="linkedin-icon.png" alt="LinkedIn">
    </a>

  </aside>

  <!-- MAIN CONTENT -->
  <main class="main">

    <!-- TABS -->
    <div class="tabs">
      <button class="tab-btn active" data-filter="all">All</button>
      <button class="tab-btn" data-filter="design">Design & Illustration</button>
      <button class="tab-btn" data-filter="photo">Photography</button>
      <button class="tab-btn" data-filter="web">Web Design</button>
    </div>

    <!-- GRID -->
    <div class="grid">

      <!-- DESIGN & ILLUSTRATION -->
<div class="card"
     data-category="design"
     data-full="assets/images/projects/graphic-design/full/test-01.jpg">
  <img src="assets/images/projects/graphic-design/thumbs/test-01.jpg"
       alt="Graphic Design Project 1"
       loading="lazy">
</div>

      <div class="card" data-category="design" data-full="images/design-2.jpg">
        <img src="images/design-2.jpg" alt="Illustration 1">
      </div>

      <div class="card" data-category="design" data-full="images/design-3.jpg">
        <img src="images/design-3.jpg" alt="Design Project 2">
      </div>

      <!-- PHOTOGRAPHY -->
      <div class="card" data-category="photo" data-full="images/photo-1.jpg">
        <img src="images/photo-1.jpg" alt="Photo 1">
      </div>

      <div class="card" data-category="photo" data-full="images/photo-2.jpg">
        <img src="images/photo-2.jpg" alt="Photo 2">
      </div>

      <div class="card" data-category="photo" data-full="images/photo-3.jpg">
        <img src="images/photo-3.jpg" alt="Photo 3">
      </div>

      <!-- WEB DESIGN -->
      <div class="card" data-category="web" data-full="images/web-1.jpg">
        <img src="images/web-1.jpg" alt="Website 1">
      </div>

      <div class="card" data-category="web" data-full="images/web-2.jpg">
        <img src="images/web-2.jpg" alt="Website 2">
      </div>

      <div class="card" data-category="web" data-full="images/web-3.jpg">
        <img src="images/web-3.jpg" alt="Website 3">
      </div>

    </div>

  </main>

</div>

<!-- LIGHTBOX MODAL -->
<div class="lightbox" id="lightbox" aria-hidden="true">
  <button class="lightbox-close" id="lightboxClose" aria-label="Close">×</button>

  <button class="lightbox-arrow lightbox-prev" id="lightboxPrev" aria-label="Previous">‹</button>

  <img class="lightbox-img" id="lightboxImg" alt="Expanded portfolio item">

  <button class="lightbox-arrow lightbox-next" id="lightboxNext" aria-label="Next">›</button>
</div>

<script src="script.js"></script>

</body>
</html>
