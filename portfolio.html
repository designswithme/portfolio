<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Portfolio | Nashae Carter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <a href="index.html" class="logo-link">
      <img src="white-logo.png" alt="Logo" class="logo-img">
    </a>

    <p class="tagline">Where Your Vision Takes Shape</p>

    <nav>
      <a href="portfolio.html">PORTFOLIO</a>
      <a href="#">RÉSUMÉ</a>
      <a href="#">CONTACT</a>
    </nav>

    <a href="https://www.linkedin.com/in/nashae-carter/"
       target="_blank"
       rel="noopener noreferrer"
       class="linkedin"
       aria-label="Visit my LinkedIn profile">
      <img src="linkedin-icon.png" alt="LinkedIn">
    </a>

  </aside>

  <!-- MAIN CONTENT -->
  <main class="main">

    <!-- TABS -->
    <div class="tabs">
      <button class="tab-btn active" data-filter="all">All</button>
      <button class="tab-btn" data-filter="design">Design & Illustration</button>
      <button class="tab-btn" data-filter="photo">Photography</button>
      <button class="tab-btn" data-filter="web">Web Design</button>
    </div>

    <!-- GRID -->
    <div class="grid">

      <!-- DESIGN & ILLUSTRATION -->
      <div class="card" data-category="design">Design Project 1</div>
      <div class="card" data-category="design">Illustration 1</div>
      <div class="card" data-category="design">Design Project 2</div>

      <!-- PHOTOGRAPHY -->
      <div class="card" data-category="photo">Photo 1</div>
      <div class="card" data-category="photo">Photo 2</div>
      <div class="card" data-category="photo">Photo 3</div>

      <!-- WEB DESIGN -->
      <div class="card" data-category="web">Website 1</div>
      <div class="card" data-category="web">Website 2</div>
      <div class="card" data-category="web">Website 3</div>

    </div>

  </main>

</div>

<script src="script.js"></script>

</body>
</html>
