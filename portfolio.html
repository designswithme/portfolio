<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Portfolio | Nashae Carter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <a href="index.html" class="logo-link">
      <img src="white-logo.png" alt="Logo" class="logo-img">
    </a>

    <p class="tagline">Where Your Vision Takes Shape</p>

    <nav>
      <a href="portfolio.html">PORTFOLIO</a>
      <a href="#">RÉSUMÉ</a>
      <a href="#">CONTACT</a>
    </nav>

    <a href="https://www.linkedin.com/in/nashae-carter/"
       target="_blank"
       rel="noopener noreferrer"
       class="linkedin"
       aria-label="Visit my LinkedIn profile">
      <img src="linkedin-icon.png" alt="LinkedIn">
    </a>

  </aside>

  <!-- MAIN CONTENT -->
  <main class="main">

    <!-- TAB BUTTONS -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="design">
        Design & Illustration
      </button>

      <button class="tab-btn" data-tab="photography">
        Photography
      </button>

      <button class="tab-btn" data-tab="web">
        Web Design
      </button>
    </div>

    <!-- DESIGN & ILLUSTRATION -->
    <section class="tab-content active" id="design">
      <div class="grid">
        <div class="card">Design Project 1</div>
        <div class="card">Illustration Project 1</div>
        <div class="card">Design Project 2</div>
        <div class="card">Illustration Project 2</div>
        <div class="card">Design Project 3</div>
        <div class="card">Illustration Project 3</div>
      </div>
    </section>

    <!-- PHOTOGRAPHY -->
    <section class="tab-content" id="photography">
      <div class="grid">
        <div class="card">Photo 1</div>
        <div class="card">Photo 2</div>
        <div class="card">Photo 3</div>
        <div class="card">Photo 4</div>
        <div class="card">Photo 5</div>
        <div class="card">Photo 6</div>
      </div>
    </section>

    <!-- WEB DESIGN -->
    <section class="tab-content" id="web">
      <div class="grid">
        <div class="card">Website 1</div>
        <div class="card">Website 2</div>
        <div class="card">Website 3</div>
        <div class="card">Website 4</div>
        <div class="card">Website 5</div>
        <div class="card">Website 6</div>
      </div>
    </section>

  </main>

</div>

<script src="script.js"></script>

</body>
</html>
