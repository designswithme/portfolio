<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- This controls the browser TAB title -->
  <title>MyResume</title>

  <link rel="stylesheet" href="styles.css">

  <style>
    body {
      margin: 0;
      background: #1f1f1f; /* dark viewer background */
      color: #fff;
      font-family: 'Poppins', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .resume-shell {
      max-width: 1100px;
      margin: 28px auto;
      padding: 0 18px 28px;
    }

    .resume-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .resume-top h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.5px;
      opacity: 0.9;
    }

    .resume-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      color: #fff;
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.12s ease, background 0.12s ease, border-color 0.12s ease;
    }

    .btn:hover {
      background: rgba(255,255,255,0.10);
      border-color: rgba(255,255,255,0.22);
      transform: translateY(-1px);
    }

    .btn.primary {
      background: #a3d4c7;
      color: #0b0b0b;
      border-color: transparent;
    }

    .btn.primary:hover {
      background: #b5e1d6;
    }

    .pdf-frame {
      background: #2a2a2a;
      border-radius: 14px;
      padding: 14px;
      border: 1px solid rgba(255,255,255,0.10);
    }

    /* “Paper” look */
    iframe {
      width: 100%;
      height: min(85vh, 980px);
      border: 0;
      border-radius: 10px;
      background: #fff;
      box-shadow: 0 18px 45px rgba(0,0,0,0.55);
    }
  </style>
</head>

<body>
  <div class="resume-shell">
    <div class="resume-top">
      <h1>My Resume</h1>

      <div class="resume-actions">
        <a class="btn" href="index.html">← Back</a>

        <button class="btn" type="button" onclick="window.print()">Print</button>

        <a class="btn primary" href="assets/resume/github-resume.pdf" download>
          Download PDF
        </a>

        <a class="btn" href="assets/resume/github-resume.pdf" target="_blank" rel="noopener">
          Open
        </a>
      </div>
    </div>

    <div class="pdf-frame">
      <iframe src="assets/resume/github-resume.pdf#view=FitH"></iframe>
    </div>
  </div>
</body>
</html>
