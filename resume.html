<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Résumé</title>

  <link rel="stylesheet" href="styles.css">

  <style>
    body {
      margin: 0;
      background-color: white;
      color: #333;
      font-family: 'Poppins', sans-serif;
    }

    .resume-shell {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 18px 40px;
    }

    .resume-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .resume-title {
      margin: 0;
      font-size: 22px;
      font-weight: 600;
      color: #6fb7b1; /* matches your hero title */
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;

      width: 160px;
      height: 46px;

      border-radius: 0;
      border: 1px solid rgba(111, 183, 177, 0.35);

      background: rgba(111, 183, 177, 0.12);
      color: #2c6f6a;

      font-weight: 600;
      letter-spacing: 0.8px;
      text-decoration: none;
      cursor: pointer;

      transition: all 0.2s ease;
    }

    .btn:hover {
      background: rgba(237, 186, 166, 0.22);
      border-color: rgba(237, 186, 166, 0.55);
      transform: translateY(-1px);
    }

    .pdf-frame {
      background: #f8f8f8;
      padding: 14px;
      border: 1px solid #e5e5e5;
    }

    iframe {
      width: 100%;
      height: min(85vh, 980px);
      border: 0;
      background: white;
      box-shadow: 0 18px 45px rgba(0,0,0,0.15);
    }

    @media (max-width: 560px) {
      .resume-top {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="resume-shell">
    <div class="resume-top">
      <h1 class="resume-title">Résumé</h1>
      <a class="btn" href="./index.html">← Back</a>
    </div>

    <div class="pdf-frame">
      <iframe src="assets/resume/github-resume.pdf#view=FitH" title="Resume PDF"></iframe>
    </div>
  </div>
</body>
</html>
