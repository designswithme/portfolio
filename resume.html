<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Résumé</title>

  <link rel="stylesheet" href="styles.css">

  <style>
    body {
      margin: 0;
      background-color: white;
      color: #333;
      font-family: 'Poppins', sans-serif;
    }

    .resume-shell {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 18px 40px;
    }

    .resume-top {
      margin-bottom: 24px;
    }

    .pdf-frame {
      background: #f8f8f8;
      padding: 14px;
      border: 1px solid #e5e5e5;
    }

    iframe {
      width: 100%;
      height: min(85vh, 980px);
      border: 0;
      background: white;
      box-shadow: 0 18px 45px rgba(0,0,0,0.15);
    }

    @media (max-width: 560px) {
      .hero-btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="resume-shell">
    <div class="resume-top">
      <a class="hero-btn" href="./index.html">← Back</a>
    </div>

    <div class="pdf-frame">
      <iframe src="assets/resume/github-resume.pdf#view=FitH" title="Resume PDF"></iframe>
    </div>
  </div>
</body>
</html>
